<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control Dulces</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, orderBy, Timestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD4UrApmFeyQFjkkaWTphmjIqFFTWLaSfw",
    authDomain: "control-dulces-8eaa0.firebaseapp.com",
    projectId: "control-dulces-8eaa0",
    storageBucket: "control-dulces-8eaa0.firebasestorage.app",
    messagingSenderId: "867880935500",
    appId: "1:867880935500:web:b1057d2a10cbf18c5c54e9",
    measurementId: "G-R6NEMJ771N"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ─── STATE ───────────────────────────────────────────────
  let currentUser = null;
  let productos = [];
  let ventas = [];
  let scannerActive = false;
  let barcodeBuffer = "";
  let barcodeTimeout = null;

  // ─── AUTH ─────────────────────────────────────────────────
  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'flex';
      document.getElementById('user-email').textContent = user.email;
      loadProductos();
      loadVentas();
    } else {
      currentUser = null;
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display = 'none';
    }
  });

  window.doLogin = async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    const btn = document.getElementById('login-btn');
    const err = document.getElementById('login-error');
    err.textContent = '';
    btn.textContent = 'Entrando...';
    btn.disabled = true;
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      err.textContent = 'Correo o contraseña incorrectos';
      btn.textContent = 'Entrar';
      btn.disabled = false;
    }
  };

  window.doLogout = async () => {
    await signOut(auth);
  };

  // ─── NAVIGATION ───────────────────────────────────────────
  window.showTab = (tab) => {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
    if (tab === 'stock') renderStock();
    if (tab === 'ventas') renderVentas();
    if (tab === 'dashboard') renderDashboard();
  };

  // ─── PRODUCTOS ────────────────────────────────────────────
  async function loadProductos() {
    const q = query(collection(db, 'productos'), orderBy('nombre'));
    onSnapshot(q, snap => {
      productos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderStock();
      renderProductoSelects();
    });
  }

  window.agregarProducto = async () => {
    const nombre = document.getElementById('p-nombre').value.trim();
    const codigo = document.getElementById('p-codigo').value.trim();
    const costoTotal = parseFloat(document.getElementById('p-costo-total').value);
    const piezas = parseInt(document.getElementById('p-piezas').value);
    const precioVenta = parseFloat(document.getElementById('p-precio-venta').value);
    const stock = parseInt(document.getElementById('p-stock').value);

    if (!nombre || !costoTotal || !piezas || !precioVenta || !stock) {
      showToast('Llena todos los campos', 'error'); return;
    }

    const costoPieza = costoTotal / piezas;
    const ganancia = precioVenta - costoPieza;

    await addDoc(collection(db, 'productos'), {
      nombre, codigo, costoTotal, piezas, costoPieza,
      precioVenta, ganancia, stock,
      creadoEn: Timestamp.now()
    });

    // clear form
    ['p-nombre','p-codigo','p-costo-total','p-piezas','p-precio-venta','p-stock'].forEach(id => {
      document.getElementById(id).value = '';
    });
    showToast('Producto agregado ✓');
  };

  window.eliminarProducto = async (id) => {
    if (!confirm('¿Eliminar este producto?')) return;
    await deleteDoc(doc(db, 'productos', id));
    showToast('Producto eliminado');
  };

  window.editarStock = async (id, delta) => {
    const p = productos.find(x => x.id === id);
    if (!p) return;
    const nuevoStock = Math.max(0, (p.stock || 0) + delta);
    await updateDoc(doc(db, 'productos', id), { stock: nuevoStock });
  };

  function renderStock() {
    const search = (document.getElementById('stock-search')?.value || '').toLowerCase();
    const filtered = productos.filter(p =>
      p.nombre.toLowerCase().includes(search) ||
      (p.codigo || '').toLowerCase().includes(search)
    );
    const cont = document.getElementById('stock-list');
    if (!cont) return;
    if (!filtered.length) {
      cont.innerHTML = '<div class="empty-state">No hay productos en stock</div>'; return;
    }
    cont.innerHTML = filtered.map(p => `
      <div class="stock-card ${p.stock <= 5 ? 'low-stock' : ''}">
        <div class="stock-card-header">
          <div>
            <div class="stock-name">${p.nombre}</div>
            <div class="stock-code">${p.codigo ? '# ' + p.codigo : 'Sin código'}</div>
          </div>
          <div class="stock-badge ${p.stock <= 5 ? 'badge-red' : 'badge-green'}">${p.stock} pzas</div>
        </div>
        <div class="stock-info">
          <span>Costo/pza: <b>$${p.costoPieza?.toFixed(2)}</b></span>
          <span>Venta: <b>$${p.precioVenta?.toFixed(2)}</b></span>
          <span>Ganancia: <b class="ganancia">$${p.ganancia?.toFixed(2)}</b></span>
        </div>
        <div class="stock-actions">
          <button class="btn-icon" onclick="editarStock('${p.id}', -1)">−</button>
          <button class="btn-icon" onclick="editarStock('${p.id}', 1)">+</button>
          <button class="btn-icon btn-danger" onclick="eliminarProducto('${p.id}')">🗑</button>
        </div>
      </div>
    `).join('');
  }

  function renderProductoSelects() {
    const sel = document.getElementById('venta-producto');
    if (!sel) return;
    sel.innerHTML = '<option value="">— Selecciona producto —</option>' +
      productos.map(p => `<option value="${p.id}">${p.nombre} ($${p.precioVenta})</option>`).join('');
  }

  // ─── VENTAS ───────────────────────────────────────────────
  async function loadVentas() {
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const q = query(collection(db, 'ventas'), orderBy('fecha', 'desc'));
    onSnapshot(q, snap => {
      ventas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderVentas();
      renderDashboard();
    });
  }

  window.onProductoChange = () => {
    const sel = document.getElementById('venta-producto');
    const pid = sel.value;
    const p = productos.find(x => x.id === pid);
    if (p) {
      document.getElementById('venta-precio').value = p.precioVenta;
    }
  };

  window.registrarVenta = async () => {
    const pid = document.getElementById('venta-producto').value;
    const cantidad = parseInt(document.getElementById('venta-cantidad').value);
    const tipo = document.getElementById('venta-tipo').value;
    const clienteNombre = document.getElementById('venta-cliente').value.trim();

    if (!pid || !cantidad) { showToast('Selecciona producto y cantidad', 'error'); return; }

    const p = productos.find(x => x.id === pid);
    if (!p) return;
    if (p.stock < cantidad) { showToast('Stock insuficiente', 'error'); return; }

    const total = p.precioVenta * cantidad;
    const gananciaTotal = p.ganancia * cantidad;
    const costoTotal = p.costoPieza * cantidad;

    await addDoc(collection(db, 'ventas'), {
      productoId: pid,
      productoNombre: p.nombre,
      cantidad,
      precioUnitario: p.precioVenta,
      costoUnitario: p.costoPieza,
      total,
      gananciaTotal,
      costoTotal,
      tipo, // 'venta' o 'debe'
      cliente: clienteNombre,
      fecha: Timestamp.now(),
      vendedor: currentUser.email
    });

    // descontar stock
    await updateDoc(doc(db, 'productos', pid), { stock: p.stock - cantidad });

    document.getElementById('venta-producto').value = '';
    document.getElementById('venta-cantidad').value = '1';
    document.getElementById('venta-cliente').value = '';
    document.getElementById('venta-tipo').value = 'venta';
    showToast(tipo === 'debe' ? `Debe registrado (${clienteNombre}) ✓` : 'Venta registrada ✓');
  };

  function renderVentas() {
    const cont = document.getElementById('ventas-list');
    if (!cont) return;
    const filtro = document.getElementById('ventas-filtro')?.value || 'hoy';
    const hoy = new Date(); hoy.setHours(0,0,0,0);

    let filtered = ventas;
    if (filtro === 'hoy') {
      filtered = ventas.filter(v => v.fecha?.toDate() >= hoy);
    } else if (filtro === 'semana') {
      const sem = new Date(hoy); sem.setDate(sem.getDate() - 7);
      filtered = ventas.filter(v => v.fecha?.toDate() >= sem);
    }

    if (!filtered.length) {
      cont.innerHTML = '<div class="empty-state">Sin ventas en este período</div>'; return;
    }

    cont.innerHTML = filtered.map(v => {
      const fecha = v.fecha?.toDate();
      const fechaStr = fecha ? fecha.toLocaleString('es-MX', {dateStyle:'short', timeStyle:'short'}) : '';
      return `
        <div class="venta-card ${v.tipo === 'debe' ? 'venta-debe' : ''}">
          <div class="venta-header">
            <span class="venta-nombre">${v.productoNombre}</span>
            <span class="venta-badge ${v.tipo === 'debe' ? 'badge-orange' : 'badge-blue'}">${v.tipo === 'debe' ? '💳 DEBE' : '✅ VENTA'}</span>
          </div>
          <div class="venta-info">
            <span>${v.cantidad} pza × $${v.precioUnitario?.toFixed(2)}</span>
            <span>Total: <b>$${v.total?.toFixed(2)}</b></span>
            <span class="ganancia">Ganancia: $${v.gananciaTotal?.toFixed(2)}</span>
          </div>
          ${v.cliente ? `<div class="venta-cliente">👤 ${v.cliente}</div>` : ''}
          <div class="venta-footer">${fechaStr} · ${v.vendedor}</div>
        </div>
      `;
    }).join('');
  }

  // ─── DASHBOARD ────────────────────────────────────────────
  function renderDashboard() {
    const cont = document.getElementById('dashboard-content');
    if (!cont) return;
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const ventasHoy = ventas.filter(v => v.fecha?.toDate() >= hoy);
    const totalVentas = ventasHoy.filter(v => v.tipo === 'venta').reduce((a, v) => a + (v.total || 0), 0);
    const totalDebes = ventasHoy.filter(v => v.tipo === 'debe').reduce((a, v) => a + (v.total || 0), 0);
    const totalGanancia = ventasHoy.reduce((a, v) => a + (v.gananciaTotal || 0), 0);
    const totalCosto = ventasHoy.reduce((a, v) => a + (v.costoTotal || 0), 0);
    const numVentas = ventasHoy.filter(v => v.tipo === 'venta').length;
    const numDebes = ventasHoy.filter(v => v.tipo === 'debe').length;

    // top productos
    const porProducto = {};
    ventasHoy.forEach(v => {
      if (!porProducto[v.productoNombre]) porProducto[v.productoNombre] = { total: 0, cantidad: 0 };
      porProducto[v.productoNombre].total += v.total || 0;
      porProducto[v.productoNombre].cantidad += v.cantidad || 0;
    });
    const top = Object.entries(porProducto).sort((a,b) => b[1].total - a[1].total).slice(0, 5);

    cont.innerHTML = `
      <div class="dash-grid">
        <div class="dash-card accent">
          <div class="dash-label">Ventas del día</div>
          <div class="dash-value">$${totalVentas.toFixed(2)}</div>
          <div class="dash-sub">${numVentas} transacciones</div>
        </div>
        <div class="dash-card">
          <div class="dash-label">Ganancia neta</div>
          <div class="dash-value green">$${totalGanancia.toFixed(2)}</div>
          <div class="dash-sub">Costo: $${totalCosto.toFixed(2)}</div>
        </div>
        <div class="dash-card">
          <div class="dash-label">Debes pendientes</div>
          <div class="dash-value orange">$${totalDebes.toFixed(2)}</div>
          <div class="dash-sub">${numDebes} registros</div>
        </div>
        <div class="dash-card">
          <div class="dash-label">Productos en stock</div>
          <div class="dash-value">${productos.length}</div>
          <div class="dash-sub">${productos.filter(p => p.stock <= 5).length} con stock bajo</div>
        </div>
      </div>
      ${top.length ? `
        <div class="top-section">
          <div class="section-title">Top productos hoy</div>
          ${top.map(([nombre, data]) => `
            <div class="top-row">
              <span>${nombre}</span>
              <span>${data.cantidad} pzas · <b>$${data.total.toFixed(2)}</b></span>
            </div>
          `).join('')}
        </div>
      ` : '<div class="empty-state">Sin ventas hoy todavía</div>'}
      <button class="btn-excel" onclick="exportarExcel()">📊 Exportar Excel del día</button>
    `;
  }

  // ─── EXCEL ────────────────────────────────────────────────
  window.exportarExcel = () => {
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const ventasHoy = ventas.filter(v => v.fecha?.toDate() >= hoy);
    if (!ventasHoy.length) { showToast('No hay ventas hoy', 'error'); return; }

    const wb = XLSX.utils.book_new();

    // Hoja ventas
    const wsData = [
      ['Producto','Cantidad','Precio Unit.','Costo Unit.','Total','Ganancia','Tipo','Cliente','Vendedor','Hora']
    ];
    ventasHoy.forEach(v => {
      wsData.push([
        v.productoNombre, v.cantidad,
        v.precioUnitario, v.costoUnitario,
        v.total, v.gananciaTotal,
        v.tipo, v.cliente || '',
        v.vendedor,
        v.fecha?.toDate().toLocaleTimeString('es-MX')
      ]);
    });

    // Totales
    const totalVentas = ventasHoy.filter(v=>v.tipo==='venta').reduce((a,v)=>a+(v.total||0),0);
    const totalDebes = ventasHoy.filter(v=>v.tipo==='debe').reduce((a,v)=>a+(v.total||0),0);
    const totalGanancia = ventasHoy.reduce((a,v)=>a+(v.gananciaTotal||0),0);
    wsData.push([]);
    wsData.push(['RESUMEN']);
    wsData.push(['Total ventas en efectivo', '', '', '', totalVentas.toFixed(2)]);
    wsData.push(['Total debes', '', '', '', totalDebes.toFixed(2)]);
    wsData.push(['Ganancia neta', '', '', '', totalGanancia.toFixed(2)]);

    const ws = XLSX.utils.aoa_to_sheet(wsData);
    XLSX.utils.book_append_sheet(wb, ws, 'Ventas');

    // Hoja stock
    const wsStock = [['Producto','Código','Stock','Costo/pza','Precio Venta','Ganancia/pza']];
    productos.forEach(p => {
      wsStock.push([p.nombre, p.codigo||'', p.stock, p.costoPieza?.toFixed(2), p.precioVenta?.toFixed(2), p.ganancia?.toFixed(2)]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(wsStock), 'Stock');

    const fecha = new Date().toLocaleDateString('es-MX').replace(/\//g,'-');
    XLSX.writeFile(wb, `ventas-${fecha}.xlsx`);
    showToast('Excel descargado ✓');
  };

  // ─── SCANNER ──────────────────────────────────────────────
  window.toggleScanner = () => {
    const box = document.getElementById('scanner-box');
    scannerActive = !scannerActive;
    if (scannerActive) {
      box.style.display = 'block';
      document.getElementById('scanner-input').focus();
      showToast('Escáner activo — apunta el lector al código');
    } else {
      box.style.display = 'none';
    }
  };

  window.onScannerInput = (e) => {
    clearTimeout(barcodeTimeout);
    barcodeBuffer += e.key !== 'Enter' ? e.key : '';
    if (e.key === 'Enter' && barcodeBuffer.length > 2) {
      document.getElementById('p-codigo').value = barcodeBuffer;
      document.getElementById('scanner-input').value = '';
      document.getElementById('scanner-result').textContent = '✓ Código: ' + barcodeBuffer;
      barcodeBuffer = '';
      showToast('Código escaneado: ' + document.getElementById('p-codigo').value);
    }
    barcodeTimeout = setTimeout(() => { barcodeBuffer = ''; }, 100);
  };

  // ─── TOAST ────────────────────────────────────────────────
  window.showToast = (msg, type = 'ok') => {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (type === 'error' ? 'toast-error' : 'toast-ok');
    setTimeout(() => t.classList.remove('show'), 3000);
  };

  // filtros reactivos
  setTimeout(() => {
    document.getElementById('stock-search')?.addEventListener('input', renderStock);
    document.getElementById('ventas-filtro')?.addEventListener('change', renderVentas);
  }, 500);

  // calcular costo por pieza en tiempo real
  window.calcCostoPieza = () => {
    const total = parseFloat(document.getElementById('p-costo-total').value) || 0;
    const piezas = parseInt(document.getElementById('p-piezas').value) || 1;
    const precio = parseFloat(document.getElementById('p-precio-venta').value) || 0;
    const cpp = total / piezas;
    const gan = precio - cpp;
    document.getElementById('costo-pieza-preview').textContent =
      total && piezas ? `Costo/pza: $${cpp.toFixed(2)}  |  Ganancia: $${gan.toFixed(2)}` : '';
  };
</script>

<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #f5c842;
    --accent2: #ff6b35;
    --green: #3ddc84;
    --orange: #ff9f43;
    --red: #ff4d6d;
    --blue: #4ecdc4;
    --text: #f0f0f5;
    --muted: #8888aa;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 30% 20%, #1a1200 0%, #0f0f13 60%);
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 400px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }
  .login-logo { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
  .login-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 36px; }
  .login-box label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
  .login-box input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 1rem;
    margin-bottom: 18px; outline: none; transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%; background: var(--accent); color: #000; font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 1rem; padding: 14px; border: none; border-radius: 10px;
    cursor: pointer; transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-error { color: var(--red); font-size: 0.85rem; margin-top: 12px; text-align: center; }

  /* ── APP ── */
  #app-screen { display: none; flex-direction: column; min-height: 100vh; }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-logo { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent); font-size: 1.2rem; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  #user-email { font-size: 0.8rem; color: var(--muted); }
  .logout-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; z-index: 100;
  }
  .nav-btn {
    flex: 1; background: none; border: none; color: var(--muted);
    padding: 12px 4px; font-size: 0.7rem; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: color 0.2s; font-family: 'DM Sans', sans-serif;
  }
  .nav-btn .icon { font-size: 1.4rem; }
  .nav-btn.active { color: var(--accent); }

  /* ── CONTENT ── */
  .content { padding: 20px 16px 90px; max-width: 700px; margin: 0 auto; width: 100%; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .page-title { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; }

  /* ── FORM ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  }
  .card-title { font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 16px; font-size: 1rem; color: var(--accent); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .form-group input, .form-group select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 14px; color: var(--text);
    font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface2); }
  .preview-text { font-size: 0.85rem; color: var(--green); margin-top: 4px; font-weight: 500; min-height: 20px; }

  .btn-primary {
    background: var(--accent); color: #000; font-family: 'Syne', sans-serif;
    font-weight: 700; padding: 13px 24px; border: none; border-radius: 10px;
    cursor: pointer; font-size: 0.95rem; width: 100%; margin-top: 8px; transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-scanner {
    background: var(--surface2); border: 1px dashed var(--accent);
    color: var(--accent); padding: 10px; border-radius: 10px;
    cursor: pointer; font-size: 0.85rem; width: 100%; transition: background 0.2s;
  }
  .btn-scanner:hover { background: rgba(245,200,66,0.1); }

  /* ── SCANNER BOX ── */
  .scanner-box {
    display: none; background: var(--surface2); border: 1px solid var(--accent);
    border-radius: 10px; padding: 14px; margin-top: 8px;
  }
  .scanner-box p { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
  .scanner-input {
    background: transparent; border: none; outline: none;
    color: transparent; caret-color: transparent; width: 1px; height: 1px;
    position: absolute;
  }
  #scanner-result { font-size: 0.9rem; color: var(--green); font-weight: 500; }

  /* ── STOCK ── */
  .search-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; color: var(--text);
    font-size: 0.95rem; outline: none; width: 100%; margin-bottom: 16px;
    font-family: 'DM Sans', sans-serif;
  }
  .search-bar:focus { border-color: var(--accent); }
  .stock-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .stock-card.low-stock { border-color: rgba(255,77,109,0.4); }
  .stock-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .stock-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
  .stock-code { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .stock-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
  .badge-green { background: rgba(61,220,132,0.15); color: var(--green); }
  .badge-red { background: rgba(255,77,109,0.15); color: var(--red); }
  .badge-blue { background: rgba(78,205,196,0.15); color: var(--blue); }
  .badge-orange { background: rgba(255,159,67,0.15); color: var(--orange); }
  .stock-info { display: flex; gap: 16px; font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; flex-wrap: wrap; }
  .stock-info .ganancia { color: var(--green); }
  .stock-actions { display: flex; gap: 8px; }
  .btn-icon {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 6px 14px;
    cursor: pointer; font-size: 1rem; transition: all 0.2s;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.btn-danger:hover { border-color: var(--red); color: var(--red); }

  /* ── VENTAS ── */
  .filtro-select {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text);
    font-size: 0.9rem; outline: none; margin-bottom: 16px; width: 100%;
    font-family: 'DM Sans', sans-serif;
  }
  .venta-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
  }
  .venta-card.venta-debe { border-left: 3px solid var(--orange); }
  .venta-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .venta-nombre { font-family: 'Syne', sans-serif; font-weight: 700; }
  .venta-info { display: flex; gap: 14px; font-size: 0.85rem; color: var(--muted); flex-wrap: wrap; margin-bottom: 6px; }
  .venta-info .ganancia { color: var(--green); }
  .venta-cliente { font-size: 0.82rem; color: var(--blue); margin-bottom: 4px; }
  .venta-footer { font-size: 0.75rem; color: var(--muted); }

  /* ── DASHBOARD ── */
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .dash-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
  }
  .dash-card.accent { border-color: rgba(245,200,66,0.4); background: rgba(245,200,66,0.05); }
  .dash-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .dash-value { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
  .dash-value.green { color: var(--green); }
  .dash-value.orange { color: var(--orange); }
  .dash-sub { font-size: 0.78rem; color: var(--muted); }
  .top-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
  .section-title { font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 14px; font-size: 0.95rem; }
  .top-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
  .top-row:last-child { border-bottom: none; }
  .btn-excel {
    width: 100%; background: rgba(61,220,132,0.1); border: 1px solid var(--green);
    color: var(--green); font-family: 'Syne', sans-serif; font-weight: 700;
    padding: 14px; border-radius: 10px; cursor: pointer; font-size: 0.95rem;
    transition: background 0.2s;
  }
  .btn-excel:hover { background: rgba(61,220,132,0.2); }

  /* ── UTILS ── */
  .empty-state { text-align: center; color: var(--muted); padding: 40px 0; font-size: 0.9rem; }
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    padding: 12px 24px; border-radius: 10px; font-size: 0.9rem; font-weight: 500;
    opacity: 0; transition: all 0.3s; z-index: 999; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast-ok { background: var(--green); color: #000; }
  .toast-error { background: var(--red); color: #fff; }

  @media (max-width: 400px) {
    .form-grid { grid-template-columns: 1fr; }
    .dash-grid { grid-template-columns: 1fr; }
    .stock-info { gap: 8px; }
  }
</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🍬 DulceControl</div>
    <div class="login-sub">Sistema de stock y ventas</div>
    <label>Correo electrónico</label>
    <input type="email" id="login-email" placeholder="tu@correo.com"/>
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="••••••••"
      onkeydown="if(event.key==='Enter') doLogin()"/>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Entrar</button>
    <div id="login-error" class="login-error"></div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════ -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">🍬 DulceControl</div>
    <div class="topbar-right">
      <span id="user-email"></span>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="content">

    <!-- ── DASHBOARD ── -->
    <div class="tab-content active" id="tab-dashboard">
      <div class="page-title">📊 Resumen del día</div>
      <div id="dashboard-content"><div class="empty-state">Cargando...</div></div>
    </div>

    <!-- ── AGREGAR PRODUCTO ── -->
    <div class="tab-content" id="tab-agregar">
      <div class="page-title">📦 Agregar producto</div>
      <div class="card">
        <div class="card-title">Datos del producto</div>
        <div class="form-grid">
          <div class="form-group form-full">
            <label>Nombre del producto</label>
            <input type="text" id="p-nombre" placeholder="Ej: Pulparindo"/>
          </div>
          <div class="form-group form-full">
            <label>Código de barras</label>
            <input type="text" id="p-codigo" placeholder="Escanea o escribe manualmente"/>
            <button class="btn-scanner" onclick="toggleScanner()">📷 Activar escáner (lector físico o cámara)</button>
            <div class="scanner-box" id="scanner-box">
              <p>Apunta el lector de código de barras — el código se capturará automáticamente.</p>
              <input class="scanner-input" id="scanner-input" onkeydown="onScannerInput(event)" autofocus/>
              <div id="scanner-result"></div>
            </div>
          </div>
          <div class="form-group">
            <label>Costo total del lote ($)</label>
            <input type="number" id="p-costo-total" placeholder="Ej: 50.00" step="0.01"
              oninput="calcCostoPieza()"/>
          </div>
          <div class="form-group">
            <label>Piezas en el lote</label>
            <input type="number" id="p-piezas" placeholder="Ej: 25" min="1"
              oninput="calcCostoPieza()"/>
          </div>
          <div class="form-group">
            <label>Precio de venta por pieza ($)</label>
            <input type="number" id="p-precio-venta" placeholder="Ej: 3.00" step="0.01"
              oninput="calcCostoPieza()"/>
          </div>
          <div class="form-group">
            <label>Piezas en stock ahora</label>
            <input type="number" id="p-stock" placeholder="Ej: 25" min="0"/>
          </div>
          <div class="form-group form-full">
            <div class="preview-text" id="costo-pieza-preview"></div>
          </div>
        </div>
        <button class="btn-primary" onclick="agregarProducto()">+ Guardar producto</button>
      </div>
    </div>

    <!-- ── STOCK ── -->
    <div class="tab-content" id="tab-stock">
      <div class="page-title">🏪 Stock actual</div>
      <input class="search-bar" id="stock-search" placeholder="🔍 Buscar producto o código..."/>
      <div id="stock-list"><div class="empty-state">Cargando...</div></div>
    </div>

    <!-- ── VENTAS ── -->
    <div class="tab-content" id="tab-ventas">
      <div class="page-title">💰 Registrar venta</div>
      <div class="card">
        <div class="card-title">Nueva transacción</div>
        <div class="form-grid">
          <div class="form-group form-full">
            <label>Producto</label>
            <select id="venta-producto" onchange="onProductoChange()">
              <option value="">— Selecciona producto —</option>
            </select>
          </div>
          <div class="form-group">
            <label>Cantidad</label>
            <input type="number" id="venta-cantidad" value="1" min="1"/>
          </div>
          <div class="form-group">
            <label>Precio unitario ($)</label>
            <input type="number" id="venta-precio" placeholder="Auto" step="0.01" readonly
              style="opacity:0.6"/>
          </div>
          <div class="form-group form-full">
            <label>Tipo</label>
            <select id="venta-tipo">
              <option value="venta">✅ Venta (pago en efectivo)</option>
              <option value="debe">💳 Debe (pago pendiente)</option>
            </select>
          </div>
          <div class="form-group form-full">
            <label>Nombre del cliente (opcional)</label>
            <input type="text" id="venta-cliente" placeholder="Ej: Juan — útil para debes"/>
          </div>
        </div>
        <button class="btn-primary" onclick="registrarVenta()">Registrar</button>
      </div>

      <div class="page-title" style="margin-top:24px">Historial</div>
      <select class="filtro-select" id="ventas-filtro">
        <option value="hoy">Hoy</option>
        <option value="semana">Últimos 7 días</option>
        <option value="todo">Todo</option>
      </select>
      <div id="ventas-list"><div class="empty-state">Cargando...</div></div>
    </div>

  </div><!-- /content -->

  <!-- ── BOTTOM NAV ── -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="dashboard" onclick="showTab('dashboard')">
      <span class="icon">📊</span>Resumen
    </button>
    <button class="nav-btn" data-tab="agregar" onclick="showTab('agregar')">
      <span class="icon">➕</span>Producto
    </button>
    <button class="nav-btn" data-tab="stock" onclick="showTab('stock')">
      <span class="icon">🏪</span>Stock
    </button>
    <button class="nav-btn" data-tab="ventas" onclick="showTab('ventas')">
      <span class="icon">💰</span>Ventas
    </button>
  </nav>
</div>

<div id="toast" class="toast"></div>

</body>
</html>
